<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LHC Boston 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0C1E35;--navy2:#1A3558;--sky:#2B9ED8;--sky-l:#E0F2FE;
  --orange:#F4821F;--orange-l:#FEF3E8;
  --text:#1E293B;--muted:#64748B;--border:#E2E8F0;
  --bg:#F5F7FA;--white:#FFFFFF;
  --green:#059669;--green-l:#ECFDF5;
  --amber:#D97706;--amber-l:#FFFBEB;
  --purple:#7C3AED;--purple-l:#F5F3FF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

/* ── ANIMATIONS ── */
@keyframes riseUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(244,130,31,.4)}60%{box-shadow:0 0 0 8px rgba(244,130,31,.0)}}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.5);opacity:1}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes networkPulse{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowBorder{0%,100%{border-color:rgba(43,158,216,.2)}50%{border-color:rgba(43,158,216,.7)}}

.fade-in{animation:riseUp .45s cubic-bezier(.22,1,.36,1) both;}
.fade-in-2{animation:riseUp .45s .08s cubic-bezier(.22,1,.36,1) both;}
.fade-in-3{animation:riseUp .45s .16s cubic-bezier(.22,1,.36,1) both;}
.fade-in-4{animation:riseUp .45s .24s cubic-bezier(.22,1,.36,1) both;}
.scale-in{animation:scaleIn .35s cubic-bezier(.34,1.56,.64,1) both;}

/* View transition */
.view.active{animation:riseUp .35s cubic-bezier(.22,1,.36,1) both;}

/* Card hover micro-interactions */
.tl-card{transition:box-shadow .2s,transform .2s cubic-bezier(.22,1,.36,1),border-color .2s;}
.tl-card:hover{transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,.08);}
.lugar-card{transition:box-shadow .2s,transform .2s;}
.lugar-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.07);}
.briefing-card{transition:box-shadow .2s,transform .2s;}
.briefing-card:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.06);}
.del-card{transition:box-shadow .2s,transform .2s cubic-bezier(.22,1,.36,1);}
.del-card:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 8px 24px rgba(0,0,0,.09);}
.home-stat{transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;}
.home-stat:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 8px 20px rgba(0,0,0,.08);}
.home-qbtn{transition:all .2s cubic-bezier(.22,1,.36,1);}
.home-qbtn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08);}
.faq-item{transition:box-shadow .2s,transform .2s;}
.faq-item:hover{box-shadow:0 4px 14px rgba(0,0,0,.06);}
.ps-item{transition:all .2s cubic-bezier(.22,1,.36,1);}
.ps-gcard{transition:border-color .2s,transform .15s;}

/* Profile card entrance */
.ps-gcard:nth-child(1){animation:riseUp .4s .05s cubic-bezier(.22,1,.36,1) both;}
.ps-gcard:nth-child(2){animation:riseUp .4s .12s cubic-bezier(.22,1,.36,1) both;}
.ps-gcard:nth-child(3){animation:riseUp .4s .19s cubic-bezier(.22,1,.36,1) both;}

/* Confirm button pulse */
.ps-confirm-btn.visible{animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1) both;}
.ps-confirm-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(244,130,31,.35);}

/* Nav active indicator slide */
.nav-btn{position:relative;}
.nav-btn::after{content:'';position:absolute;bottom:0;left:50%;width:0;height:2px;background:var(--sky);transition:all .2s cubic-bezier(.22,1,.36,1);transform:translateX(-50%);}
.nav-btn.active::after{width:100%;}
.nav-btn{border-bottom:none !important;}

/* Glowing dot in header */
.dot{animation:dotPulse 2.5s ease-in-out infinite;}

/* Day hero entrance */
.day-hero{animation:fadeIn .3s ease both;}

/* Maps button */
.maps-btn{transition:all .2s cubic-bezier(.22,1,.36,1);}
.maps-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(12,30,53,.25);}

/* Flight leg highlight */
.fl-leg-hl{transition:background .2s;}
.fl-block{animation:riseUp .4s cubic-bezier(.22,1,.36,1) both;}

/* Innovation card expand */
#dc-inn-luisjose,#dc-inn-pablo,#dc-inn-sergio,#dc-inn-luisfernando,
#dc-inn-caroline,#dc-inn-lenin,#dc-inn-mariacristina,#dc-inn-hugo{
  animation:riseUp .3s cubic-bezier(.22,1,.36,1) both;
}

/* ── PROFILE SCREEN ── */
#profile-screen{
  position:fixed;inset:0;background:var(--navy);z-index:200;
  overflow-y:auto;display:flex;flex-direction:column;
}
.ps-hero{
  padding:44px 24px 32px;text-align:center;
  background:linear-gradient(160deg,#071829 0%,#0C2040 40%,#102848 70%,#071829 100%);
  position:relative;overflow:hidden;
}
.ps-hero::before{
  content:'';position:absolute;width:320px;height:320px;
  background:radial-gradient(ellipse,rgba(43,158,216,.18) 0%,transparent 65%);
  top:-60px;right:-80px;pointer-events:none;animation:fadeIn 1.2s ease both;
}
.ps-hero::after{
  content:'';position:absolute;width:200px;height:200px;
  background:radial-gradient(ellipse,rgba(244,130,31,.12) 0%,transparent 65%);
  bottom:-40px;left:-30px;pointer-events:none;animation:fadeIn 1.5s .3s ease both;
}
.ps-pill{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:6px 14px;margin-bottom:22px;
  animation:fadeIn .5s ease both;
}
.ps-pill span{color:var(--sky);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.ps-pill .dot{width:5px;height:5px;background:var(--orange);border-radius:50%;animation:pulse 2s infinite;}
.ps-title{font-family:'Fraunces',serif;font-size:34px;color:white;line-height:1.1;margin-bottom:10px;animation:fadeInUp .4s .1s ease both;}
.ps-title em{font-style:italic;color:var(--sky);}
.ps-sub{font-size:13px;color:rgba(255,255,255,.45);animation:fadeInUp .4s .2s ease both;}
.ps-body{padding:0 16px 48px;max-width:480px;margin:0 auto;width:100%;animation:fadeInUp .4s .25s ease both;}
.ps-groups{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.ps-gcard{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;overflow:hidden;transition:border-color .15s;}
.ps-gcard.active{border-color:rgba(43,158,216,.5);}
.ps-ghdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .15s;user-select:none;}
.ps-ghdr:hover{background:rgba(255,255,255,.07);}
.ps-gicon{font-size:22px;flex-shrink:0;}
.ps-ginfo{flex:1;}
.ps-gname{font-size:14px;font-weight:600;color:white;line-height:1.2;}
.ps-gcount{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}
.ps-gchev{color:rgba(255,255,255,.3);font-size:12px;transition:transform .2s;flex-shrink:0;}
.ps-gcard.active .ps-gchev{transform:rotate(180deg);}
.ps-gdrop{display:none;padding:0 12px 12px;}
.ps-gcard.active .ps-gdrop{display:block;animation:fadeIn .18s ease both;}
.ps-gsel{
  width:100%;padding:13px 40px 13px 14px;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);
  border-radius:10px;color:white;outline:none;
  appearance:none;-webkit-appearance:none;cursor:pointer;
  transition:border-color .2s;
}
.ps-gsel option{background:#1A3558;color:white;}
.ps-gsel:focus{border-color:var(--sky);}
.ps-gsel-wrap{position:relative;}
.ps-gsel-arrow{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:10px;color:rgba(255,255,255,.4);pointer-events:none;}
.ps-preview{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:12px;padding:13px 15px;margin-bottom:12px;
  display:none;align-items:center;gap:12px;
}
.ps-preview.visible{display:flex;animation:fadeIn .2s ease both;}
.ps-preview-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0;}
.ps-preview-name{font-size:14px;font-weight:600;color:white;}
.ps-preview-role{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.ps-confirm-btn{
  width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  background:var(--orange);color:white;transition:all .15s;
  display:none;letter-spacing:.01em;
}
.ps-confirm-btn:hover{background:#E0720F;transform:translateY(-1px);}
.ps-confirm-btn:active{transform:scale(.98);}
.ps-confirm-btn.visible{display:block;animation:scaleIn .2s ease both;}

/* ── APP ── */
#app{display:none;min-height:100vh;}
.app-hdr{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.06);}
.app-hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 15px 8px;}
.app-mark{width:30px;height:30px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:15px;color:white;flex-shrink:0;transition:transform .15s;}
.app-mark:hover{transform:scale(1.08);}
.app-titles{margin-left:9px;flex:1;}
.app-t{color:white;font-size:13px;font-weight:600;}
.app-s{color:var(--sky);font-size:9px;letter-spacing:.07em;text-transform:uppercase;margin-top:1px;}
.profile-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .15s;}
.profile-chip:hover{background:rgba(255,255,255,.14);}
.chip-av{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;}
.chip-nm{font-size:11px;color:rgba(255,255,255,.75);font-weight:500;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-nav{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 10px;gap:2px;}
.app-nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:8px 12px;font-size:12px;font-weight:500;color:rgba(255,255,255,.42);border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:.02em;}
.nav-btn:hover{color:rgba(255,255,255,.72);}
.nav-btn.active{color:var(--sky);}

/* ── VIEWS ── */
.view{display:none;padding:16px;max-width:680px;margin:0 auto;}
.view.active{display:block;animation:fadeInUp .28s ease both;}
@media(min-width:700px){.view{padding:22px 20px;}}
.v-title{font-family:'Fraunces',serif;font-size:25px;color:var(--navy);font-weight:500;margin-bottom:3px;}
.v-sub{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5;}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
.tag-ok{background:var(--green-l);color:#057a4c;}
.tag-pend{background:var(--amber-l);color:#92550a;}
.tag-walk{background:#ECFDF5;color:#065f46;}
.tag-transit{background:var(--sky-l);color:#1060A0;}
.tag-opt{background:var(--purple-l);color:#5b21b6;}
.tag-coms{background:#FDF4FF;color:#7e22ce;}

/* ── HOME ── */
.home-hero{background:linear-gradient(135deg,#0C1E35 0%,#0D3060 50%,#0C1E35 100%);border-radius:16px;padding:26px 22px;margin-bottom:15px;position:relative;overflow:hidden;}
.home-hero::before{content:'';position:absolute;width:260px;height:260px;background:radial-gradient(circle,rgba(43,158,216,.18) 0%,transparent 70%);top:-80px;right:-60px;pointer-events:none;}
.home-hero::after{content:'';position:absolute;width:140px;height:140px;background:radial-gradient(circle,rgba(244,130,31,.12) 0%,transparent 70%);bottom:-40px;left:-30px;pointer-events:none;}
.home-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(244,130,31,.2);border:1px solid rgba(244,130,31,.3);border-radius:20px;padding:4px 11px;margin-bottom:13px;}
.home-badge span{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--orange);}
.home-greeting{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:3px;}
.home-title{font-family:'Fraunces',serif;font-size:27px;color:white;line-height:1.15;margin-bottom:5px;}
.home-title em{font-style:italic;color:var(--sky);}
.home-dates{font-size:12px;color:rgba(255,255,255,.42);}
.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.home-stat{background:white;border:1px solid var(--border);border-radius:10px;padding:11px 6px;text-align:center;transition:transform .15s;}
.home-stat:hover{transform:translateY(-2px);}
.home-stat .n{font-size:21px;font-weight:700;color:var(--navy);line-height:1;}
.home-stat .l{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3;}
.home-about{background:var(--navy);border-radius:14px;padding:17px;color:white;margin-bottom:13px;}
.home-about h3{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:7px;}
.home-about p{font-size:13px;color:rgba(255,255,255,.62);line-height:1.7;}
.home-today{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.home-today-hdr{background:var(--navy);padding:11px 15px;color:white;display:flex;align-items:center;justify-content:space-between;}
.home-today-hdr .lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--sky);}
.home-today-hdr .day{font-family:'Fraunces',serif;font-size:16px;}
.home-ev{padding:9px 15px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;}
.home-ev:last-of-type{border-bottom:none;}
.home-ev-time{font-size:10px;font-weight:600;color:var(--muted);min-width:48px;flex-shrink:0;padding-top:2px;}
.home-ev-name{font-size:13px;font-weight:500;color:var(--text);}
.home-ev-loc{font-size:11px;color:var(--muted);margin-top:1px;}
.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.home-card{background:white;border:1px solid var(--border);border-radius:12px;padding:14px;transition:box-shadow .15s,transform .15s;}
.home-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.06);transform:translateY(-1px);}
.home-card-icon{margin-bottom:8px;line-height:1;}.home-card-icon svg{display:block;}.qico{display:flex;align-items:center;justify-content:center;width:24px;height:24px;color:var(--navy);}
.home-card-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px;}
.home-card-text{font-size:12px;color:var(--muted);line-height:1.6;}
.home-card-text a{color:var(--sky);text-decoration:none;}
.home-quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.home-qbtn{background:white;border:1.5px solid var(--border);border-radius:10px;padding:11px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .15s;}
.home-qbtn:hover{border-color:var(--sky);box-shadow:0 2px 8px rgba(43,158,216,.12);}

.home-qbtn .lbl{font-size:12px;font-weight:600;color:var(--navy);}

/* ── AGENDA ── */
.day-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:15px;padding-bottom:2px;}
.day-pills::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:white;border:1.5px solid var(--border);color:var(--muted);transition:all .18s;white-space:nowrap;}
.day-pill:hover:not(.active){border-color:var(--sky);color:var(--navy);}
.day-pill.active{background:var(--navy);color:white;border-color:var(--navy);}
.day-hero{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:14px;padding:16px 18px;margin-bottom:13px;color:white;position:relative;overflow:hidden;}
.day-hero::after{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(43,158,216,.09);border-radius:50%;pointer-events:none;}
.day-hero-n{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--sky);font-weight:600;margin-bottom:3px;}
.day-hero-t{font-family:'Fraunces',serif;font-size:20px;font-weight:500;margin-bottom:3px;}
.day-hero-s{font-size:12px;color:rgba(255,255,255,.5);}
.tl-row{display:grid;grid-template-columns:54px 16px 1fr;align-items:start;}
.tl-time{font-size:10px;color:var(--muted);text-align:right;padding-top:14px;padding-right:9px;line-height:1.3;font-weight:500;}
.tl-stem{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:15px;z-index:1;transition:transform .15s;}
.tl-line{width:2px;flex:1;min-height:10px;}
.tl-card{background:white;border:1px solid var(--border);border-radius:12px;margin-bottom:8px;margin-left:8px;overflow:hidden;border-left:3px solid transparent;cursor:pointer;transition:box-shadow .18s,transform .15s;}
.tl-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.06);transform:translateX(2px);}
.tl-inner{padding:10px 13px;}
.tl-card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.35;}
.tl-chips{display:flex;flex-wrap:wrap;gap:4px;}
.tl-detail{display:none;padding:10px 13px 12px;border-top:1px solid var(--border);background:var(--bg);}
.tl-card.open .tl-detail{display:block;animation:fadeIn .2s ease both;}
.tl-dtext{font-size:12px;color:#475569;line-height:1.7;margin-bottom:8px;}
.tl-addr{font-size:11px;color:var(--muted);margin-bottom:7px;}
.maps-btn{display:inline-flex;align-items:center;gap:5px;background:var(--navy);color:white;font-size:11px;font-weight:600;padding:6px 11px;border-radius:6px;text-decoration:none;transition:all .15s;}
.maps-btn:hover{background:var(--navy2);transform:translateY(-1px);}
.reg-btn{display:inline-flex;align-items:center;gap:5px;background:var(--orange-l);color:var(--orange);border:1px solid rgba(244,130,31,.3);font-size:11px;font-weight:600;padding:6px 11px;border-radius:6px;text-decoration:none;transition:all .15s;}
.reg-btn:hover{background:var(--orange);color:white;transform:translateY(-1px);}
.trail-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:white;border-radius:8px;padding:7px 11px;cursor:pointer;margin-top:8px;font-size:11px;font-weight:600;transition:background .15s;}
.trail-toggle:hover{background:var(--navy2);}
.trail-list{display:none;margin-top:5px;}
.trail-list.open{display:block;animation:fadeIn .2s ease both;}
.trail-stop{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.trail-stop:last-child{border-bottom:none;}
.trail-num{width:20px;height:20px;border-radius:50%;background:var(--sky);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.trail-name{font-size:12px;font-weight:600;color:var(--text);}
.trail-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px;}
.trail-link{font-size:10px;color:var(--sky);text-decoration:none;margin-top:3px;display:inline-block;}

/* ── LUGARES ── */
.lugar-card{background:white;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s;}
.lugar-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.05);}
.lugar-hdr{padding:13px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:background .12s;}

.lugar-addr{font-size:11px;color:var(--muted);line-height:1.4;}

.lugar-txt{font-size:13px;color:#475569;line-height:1.7;}
.lugar-ask{background:var(--sky-l);border-left:3px solid var(--sky);border-radius:0 8px 8px 0;padding:8px 11px;margin-top:8px;font-size:12px;color:#1060A0;line-height:1.6;}
.lugar-ask strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.chip-d{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;}
.cd1{background:#FFF7ED;color:#9a3412;}
.cd2{background:#EFF6FF;color:#1d4ed8;}
.cd3{background:var(--purple-l);color:#5b21b6;}
.cd4{background:var(--green-l);color:#065f46;}

/* ── MI VIAJE ── */
.hotel-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:14px;padding:16px;color:white;margin-bottom:12px;}
.hotel-banner-nm{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:5px;}
.hotel-banner-d{font-size:12px;color:rgba(255,255,255,.6);line-height:1.8;}
.hotel-banner-d strong{color:var(--sky);}
.fl-block{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:11px;}
.fl-hdr{padding:10px 15px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.fh-arr{background:var(--green-l);color:#057a4c;}
.fh-dep{background:var(--orange-l);color:#9a3412;}
.fl-leg{display:grid;grid-template-columns:72px 1fr 72px;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border);gap:8px;}
.fl-leg:last-child{border-bottom:none;}
.fl-leg-hl{background:rgba(43,158,216,.04);}
.fl-leg-right{text-align:right;}
.fl-code2{font-size:19px;font-weight:700;color:var(--navy);line-height:1;}

.fl-cityname{font-size:9px;color:var(--muted);line-height:1.2;margin-top:1px;}
.fl-time2{font-size:14px;font-weight:600;color:var(--muted);margin-top:2px;}
.fl-time2.main-time{font-size:20px;font-weight:700;color:var(--navy);}
.fl-date2{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3;}
.fl-leg-mid2{text-align:center;}
.fl-fn{font-size:10px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:4px;}
.fl-arr-line{font-size:14px;color:var(--border);}
.fl-note{font-size:10px;color:var(--sky);margin-top:2px;line-height:1.3;}

/* Transfer info */
.transfer-block{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:11px;}
.transfer-hdr{padding:10px 15px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--bg);color:var(--navy);}
.transfer-item{padding:13px 15px;border-bottom:1px solid var(--border);}
.transfer-item:last-child{border-bottom:none;}
.transfer-dir{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}

.tdir-dep{color:#9a3412;}

.transfer-row:last-child{margin-bottom:0;}
.transfer-icon{font-size:13px;flex-shrink:0;width:16px;}
.transfer-txt{line-height:1.5;}
.transfer-txt strong{color:var(--navy2);}

/* ── DELEGACIÓN ── */
.del-filter{display:flex;gap:6px;margin-bottom:13px;overflow-x:auto;scrollbar-width:none;}
.del-filter::-webkit-scrollbar{display:none;}
.del-fbtn{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:white;border:1.5px solid var(--border);color:var(--muted);transition:all .15s;}
.del-fbtn:hover{border-color:var(--sky);}
.del-fbtn.active{background:var(--navy);color:white;border-color:var(--navy);}
.del-glabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.del-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
@media(min-width:460px){.del-grid{grid-template-columns:repeat(3,1fr);}}
.del-card{background:white;border:1px solid var(--border);border-radius:12px;padding:13px 11px;text-align:center;transition:box-shadow .15s,transform .12s;}

.del-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;margin:0 auto 7px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;cursor:pointer;}
.del-country{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.03em;margin-bottom:4px;display:block;}
.del-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;}
.del-role{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:5px;}

/* ── FAQ ── */
.faq-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--orange);margin:18px 0 7px;}
.faq-cat:first-child{margin-top:0;}

.faq-a strong{color:var(--navy2);} .faq-a a{color:var(--sky);text-decoration:none;}

function toggleGroup(key) {
  if (activeGroup === key) {
    document.getElementById('gc-'+key).classList.remove('active');
    activeGroup = null;
  } else {
    if (activeGroup) document.getElementById('gc-'+activeGroup).classList.remove('active');
    document.getElementById('gc-'+key).classList.add('active');
    activeGroup = key;
  }
}

function previewProfile(id) {
  const preview = document.getElementById('ps-preview');
  const av = document.getElementById('ps-preview-av');
  const nm = document.getElementById('ps-preview-name');
  const rl = document.getElementById('ps-preview-role');
  const btn = document.getElementById('ps-confirm-btn');
  selectedProfileId = id || null;
  if (!id) { preview.classList.remove('visible'); btn.classList.remove('visible'); return; }
  const p = PEOPLE.find(x=>x.id===id);
  const ini = p.name.split(' ').slice(0,2).map(w=>w[0]).join('');
  av.textContent = ini; av.style.background = p.color;
  nm.textContent = p.name;
  rl.textContent = [p.country, p.role].filter(Boolean).join('  ·  ');
  preview.classList.add('visible');
  btn.classList.add('visible');
}

function confirmProfile() {
  if (!selectedProfileId) return;
  selectProfile(selectedProfileId);
}

  localStorage.setItem('lhc26_v4', id);

function filterEvents(events, day) {
  const isPress = CP.persona==='press', departsFri=CP.departsFri, isBrandon=CP.id==='brandon';
  return events.filter(ev => {
    if (ev.onlyIds && !ev.onlyIds.includes(CP.id)) return false;
    if (ev.onlyFriLeaveNotBrandon) return departsFri && !isBrandon;
    if (ev.onlyFriLeave && !departsFri) return false;
    if (ev.skipFriLeave && departsFri) return false;
    if (ev.track==='champions' && isPress) return false;
    if (ev.track==='press' && !isPress) return false;
    if (ev.type==='optional') {
      if (ev.track==='press' && !isPress) return false;
      if (ev.track==='champions' && isPress) return false;
    }
    return true;
  });
}

let expandedCard = null;

function toggleInnovCard(id) {
  const card = document.getElementById('dc-inn-'+id);
  if (!card) return;
  if (expandedCard && expandedCard !== id) {
    const prev = document.getElementById('dc-inn-'+expandedCard);
    if (prev) prev.style.display = 'none';
  }
  const isOpen = card.style.display !== 'none';
  card.style.display = isOpen ? 'none' : 'block';
  expandedCard = isOpen ? null : id;
}

        <div style="margin-top:11px">${mapsBtn(v.mk,v.addr)}</div>
      </div>
    </div>`).join('');
  el.innerHTML=`
    <h2 class="v-title">${t('vtitle_bos')}</h2>
    <p class="v-sub">${LANG==='pt'?'Contexto estratégico e briefing por local. Toque para expandir':'Contexto estratégico y briefing por venue'}</p>

      <h3>${LANG==='pt'?'A capital mundial da inovação em saúde':'La capital mundial de la innovación en salud'}</h3>
      <p>${LANG==='pt'?'Boston e Cambridge concentram mais laboratórios de biotecnologia por km² do que qualquer outra cidade do planeta. Harvard, MIT, MGH e dezenas de startups de classe mundial compartilham poucas quadras em Kendall Square. Esta seção te prepara para aproveitar ao máximo cada visita.':'Boston y Cambridge concentran más laboratorios de biotecnología por km² que cualquier otra ciudad del planeta. Esta sección te prepara para aprovechar cada visita.'}</p>
    </div>
    <div style="background:white;border:1.5px solid var(--orange);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">
      <div style="color:var(--orange);flex-shrink:0">${ICO.report}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px">Informe Latam Health Champions 2026</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Resultados, análisis y tendencias de las 234 innovaciones de la edición 2026.</div>
        <a href="#" style="font-size:12px;font-weight:700;color:var(--orange);text-decoration:none" id="lhc-report-link">Acceder al informe →</a>

    </div>
    ${overviews}
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border)">${t('briefing_ask')} por venue</div>
    ${venCards}`;
}
